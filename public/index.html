<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Legal Document Summarizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>⚖️ Legal Document Summarizer</h1>
  </header>

  <div class="container">
    <form id="uploadForm">
      <label for="pdf">Upload PDF File:</label>
      <input type="file" name="pdf" id="pdf" accept="application/pdf" required />

      <button type="submit">📤 Upload & Summarize</button>
    </form>

    <pre id="output">Summary will appear here...</pre>
  </div>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);

      const res = await fetch('/upload', {
        method: 'POST',
        body: formData
      });

      const data = await res.json();
      document.getElementById('output').textContent = data.summary || data.error;
    });
  </script>
</body>
</html>
